name: CI/CD Deployment to VPS

on:
  push:
    branches:
      - master
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Checkout Repository
        uses: actions/checkout@v4

      # --- 1. BUILD FRONTEND (React / Vite) ---
      - name: ⚡ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: Lootopia.Client/package-lock.json

      - name: 📦 Install Frontend Dependencies
        run: npm ci --legacy-peer-deps
        working-directory: ./Lootopia.Client

      - name: 🏗️ Build Frontend
        run: npm run build
        working-directory: ./Lootopia.Client
        env:
          VITE_API_URL: /api # Ajustez si l'API est sur un sous-domaine dédié

      # --- 2. DEPLOYMENT VIA SSH / RSYNC ---
      - name: 🔑 Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: unnecessary # géré dynamiquement ci-dessous avec ssh-keyscan

      - name: 🛡️ Add VPS to Known Hosts
        run: ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      # Intégration directe du Frontend React dans le wwwroot du Backend .NET
      - name: 📥 Inject Frontend into Backend wwwroot
        run: |
          mkdir -p ./Lootopia.Api/wwwroot
          cp -r ./Lootopia.Client/dist/* ./Lootopia.Api/wwwroot/

      # Transfert du code global unifié vers le VPS
      - name: 🐳 Copy Unified Backend & Infrastructure Files
        run: |
          rsync -avz --exclude='bin/' --exclude='obj/' --exclude='node_modules/' ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/lootopia/

      - name: 🔄 Restart Application Infrastructure on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/lootopia
            # Lance les conteneurs (Postgres + API .NET) en arrière-plan
            docker compose up -d --build
            # Nettoyage des anciennes images inutilisées
            docker image prune -f
