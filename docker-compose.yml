services:
  db:
    image: postgis/postgis:17-3.5
    container_name: lootopia-db
    environment:
      POSTGRES_USER: lootopia
      POSTGRES_PASSWORD: lootopia_dev_2026
      POSTGRES_DB: lootopia
    ports:
      - "5432:5432"
    volumes:
      - lootopia_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lootopia"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  lootopia_pgdata:
